name: 自动更新星标项目

on:
  schedule:
    - cron: '0 0 * * *'  # 每天 UTC 0 点运行（北京时间 8 点）
  workflow_dispatch:

permissions:
  contents: write
  actions: write  # 允许删除 Actions 运行记录

jobs:
  update-readme:
    runs-on: ubuntu-latest

    env:
      GH_TOKEN: ${{ secrets.GH_TOKEN }}
      GH_USERNAME: ${{ secrets.GH_USERNAME }}
      OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
      CHATGPT_API_URL: ${{ secrets.CHATGPT_API_URL }}
      CHATGPT_MODEL: ${{ secrets.CHATGPT_MODEL }}
      TRANSLATE_DELAY: ${{ secrets.TRANSLATE_DELAY }}

    steps:
      - name: ✅ Checkout 仓库
        uses: actions/checkout@v3

      - name: ✅ 设置 Python 环境
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: ✅ 安装依赖
        run: pip install --no-cache-dir -r requirements.txt

      - name: ✅ 运行脚本生成 README
        run: python update_readme.py

      - name: ✅ 提交并推送更新
        run: |
          git config --global user.name "${{ env.GH_USERNAME }}"
          git config --global user.email "${{ env.GH_USERNAME }}@users.noreply.github.com"
          git remote set-url origin https://x-access-token:${GH_TOKEN}@github.com/${{ github.repository }}
          git add README.md translations.json
          git commit -m "自动更新星标项目列表" || echo "没有变更"
          git push origin HEAD:${{ github.ref_name }}

      - name: 🧹 清理旧的运行记录（只保留最近5条）
        env:
          GH_TOKEN: ${{ secrets.GH_TOKEN }}
        run: |
          echo "正在清理旧的 Actions 运行记录..."
          # 获取所有运行记录（最新的在前），跳过前5条，删除其余
          gh run list --repo ${{ github.repository }} --limit 100 \
            --json databaseId --jq '.[5:][] | .databaseId' | \
          while read id; do
            gh run delete "$id" --repo ${{ github.repository }} && echo "  🗑️ 已删除运行记录: $id"
          done
          echo "✅ 清理完成"
